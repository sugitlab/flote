name: Release (Windows only)

on:
  push:
    tags:
      - "v*-win*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows (x64)
        working-directory: apps/desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Rename MSI (remove locale suffix)
        shell: pwsh
        run: |
          $msiDir = "apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi"
          $msi = Get-ChildItem -Path $msiDir -Filter "*.msi" | Select-Object -First 1
          $newName = $msi.Name -replace "_en-US", ""
          Rename-Item $msi.FullName (Join-Path $msiDir $newName)
          echo "MSI_PATH=$msiDir/$newName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Flote ${{ github.ref_name }}"
          body: |
            Windows ビルドテスト用リリース
          draft: true
          prerelease: true
          files: ${{ env.MSI_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
