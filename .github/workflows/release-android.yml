name: Release (Android only)

on:
  push:
    tags:
      - "v*-android*"

jobs:
  release-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.1.10909125" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.local
        working-directory: apps/mobile
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\nEXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' \
            "${{ secrets.VITE_SUPABASE_URL }}" \
            "${{ secrets.VITE_SUPABASE_ANON_KEY }}" > .env.local

      - name: Expo prebuild (Android)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Place signing keystore
        working-directory: apps/mobile/android/app
        run: echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
             apps/mobile/android/app/build/outputs/apk/release/flote-android-${{ github.ref_name }}.apk

      - name: Create draft release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: true
          files: apps/mobile/android/app/build/outputs/apk/release/flote-android-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
